name: ci-shared

# Reusable end-to-end job shared by the per-architecture workflows
# (ci-x86_64 / ci-aarch64 use GitHub-hosted runners; riscv64 a self-hosted one).
# Each caller passes its own `arch` (for naming) and `runs_on` (the runner). It
# mirrors the local "Docker One-Click Test": build the image, run
# docker/scripts/run-tests.sh.

on:
  workflow_call:
    inputs:
      arch:
        description: Architecture name, for image tags and the summary (x86_64 / aarch64 / riscv64)
        required: true
        type: string
      runs_on:
        description: The runs-on runner label (e.g. ubuntu-latest, ubuntu-24.04-arm)
        required: true
        type: string

jobs:
  e2e:
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t lorelei-test-${{ inputs.arch }} .

      - name: Run end-to-end tests
        id: run
        run: |
          set -o pipefail
          docker run --rm lorelei-test-${{ inputs.arch }} bash docker/scripts/run-tests.sh 2>&1 | tee run.log

      - name: Publish summary
        if: always()
        run: |
          arch="${{ inputs.arch }}"
          # Strip any stray ANSI colour codes so the summary renders cleanly.
          clean="$(sed -r 's/\x1b\[[0-9;]*m//g' run.log)"

          if [ "${{ steps.run.outcome }}" = "success" ]; then
            status="✅ **Passed** on \`$arch\`"
          else
            status="❌ **Failed** on \`$arch\` (see the log below)"
          fi

          # Turn the three minizip wall-clock lines into a table (native vs emulated vs lorelei).
          rows="$(printf '%s\n' "$clean" | awk '
            /^[[:space:]]+(native|emulated|lorelei)[^0-9]*[0-9]+\.[0-9]+s[[:space:]]*$/ {
              t = $NF; label = $0
              sub(/^[[:space:]]+/, "", label)
              sub(/[[:space:]]+[0-9.]+s[[:space:]]*$/, "", label)
              printf "| %s | %s |\n", label, t
            }')"

          {
            echo "## Lorelei End-to-End — \`$arch\`"
            echo
            echo "$status"

            if [ "${{ steps.run.outcome }}" = "success" ]; then
              echo
              echo "### Stages"
              echo "- ✅ Auto tests (ctest)"
              if printf '%s' "$clean" | grep -q 'skipped (x86_64-only)'; then
                echo "- ⏭️ ThunkExample end-to-end (skipped, x86_64-only)"
              else
                echo "- ✅ ThunkExample end-to-end"
              fi
              echo "- ✅ minizip over the zlib thunk"
            fi

            if [ -n "$rows" ]; then
              echo
              echo "### minizip Over the zlib Thunk"
              echo
              echo "minizip stays emulated; only its zlib calls cross to the host, so the lorelei run lands near native."
              echo
              echo "| Run | Wall time |"
              echo "| --- | --- |"
              echo "$rows"
            fi

            echo
            echo "<details><summary>Full build &amp; test log</summary>"
            echo
            echo '```text'
            echo "$clean"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
