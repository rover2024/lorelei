name: ci-shared

# Reusable end-to-end job shared by the per-architecture workflows
# (ci-x86_64 / ci-aarch64). Each caller passes its own `arch`, which selects
# the matching self-hosted runner. It mirrors the local "Docker One-Click
# Test": build the image, run docker/scripts/run-tests.sh.

on:
  workflow_call:
    inputs:
      arch:
        description: Runner architecture label (x86_64 / aarch64 / riscv64)
        required: true
        type: string

jobs:
  e2e:
    runs-on: [self-hosted, linux, "${{ inputs.arch }}"]
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t lorelei-test-${{ inputs.arch }} .

      - name: Run end-to-end tests
        id: run
        run: |
          set -o pipefail
          docker run --rm lorelei-test-${{ inputs.arch }} bash docker/scripts/run-tests.sh 2>&1 | tee run.log

      - name: Publish summary
        if: always()
        run: |
          # Strip any stray ANSI colour codes so the summary renders cleanly.
          clean="$(sed -r 's/\x1b\[[0-9;]*m//g' run.log)"

          if [ "${{ steps.run.outcome }}" = "success" ]; then
            status="✅ Lorelei end-to-end tests passed on ${{ inputs.arch }}"
          else
            status="❌ Tests failed on ${{ inputs.arch }} — see the log below"
          fi

          {
            echo "## Lorelei end-to-end — ${{ inputs.arch }}"
            echo
            echo "$status"
            echo
            echo "<details><summary>Full build &amp; test log</summary>"
            echo
            echo '```text'
            echo "$clean"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
