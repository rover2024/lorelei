name: aarch64
run-name: aarch64 e2e (${{ github.ref_name }})

# End-to-end test on a GitHub-hosted aarch64 runner, once per host toolchain (gcc, clang). Runs on a
# push to main (development happens on dev, so main is the integration line) and on manual dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        toolchain: [gcc, llvm]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test
        with:
          arch: aarch64
          toolchain: ${{ matrix.toolchain }}
