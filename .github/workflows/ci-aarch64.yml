name: aarch64

# Manual-only end-to-end test on a GitHub-hosted aarch64 runner, once per host toolchain (gcc, clang).
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        toolchain: [gcc, llvm]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test
        with:
          arch: aarch64
          toolchain: ${{ matrix.toolchain }}
