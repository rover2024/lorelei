name: riscv64

# Manual-only end-to-end test on the riscv64 self-hosted runner (ultrarisc). Never runs on push;
# trigger it from the Actions tab ("Run workflow"). GitHub has no hosted riscv64 runner, so this is
# the one architecture served by a self-hosted machine.
on:
  workflow_dispatch:

jobs:
  e2e:
    uses: ./.github/workflows/_ci-shared.yml
    with:
      arch: riscv64
      runs_on: riscv64
      # ultrarisc is a domestic self-hosted machine: build through the USTC apt mirror.
      build_args: --build-arg USE_USTC_MIRROR=1
