name: deploy

# Build the deployable runtime trees and upload them as artifacts. Fires on a version tag (the real
# release path) and on manual dispatch (to smoke-test without tagging). One x86_64 job builds the two
# x86_64 trees natively and cross-compiles the aarch64 and riscv64 host trees, so every artifact is
# uploaded from a runner that supports actions/upload-artifact (unlike the self-hosted riscv64 runner,
# which has no Node 20).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      # Reuse the one-click image: it runs bootstrap-ubuntu.sh for the toolchain and builds the staging
      # lorelei (with TLC) plus the thunks, which pre-generates the thunk sources build-deploy.sh reuses.
      - name: Build the image
        shell: bash
        # Deploy runs no tests, so skip the slow QEMU build.
        run: |
          docker build \
            --build-arg BUILD_QEMU=0 \
            --build-arg http_proxy="${http_proxy:-}" \
            --build-arg https_proxy="${https_proxy:-}" \
            --build-arg no_proxy="${no_proxy:-}" \
            -f docker/Dockerfile -t lorelei-deploy-x86_64 .

      - name: Build the deploy trees (no tools, no tests)
        shell: bash
        run: |
          docker run --name lorelei-deploy-x86_64 \
            lorelei-deploy-x86_64 bash docker/scripts/build-deploy.sh /home/user/deploy
          docker cp lorelei-deploy-x86_64:/home/user/deploy ./deploy
          docker rm lorelei-deploy-x86_64

      - name: Upload x86_64-host
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-host
          path: deploy/x86_64-host

      - name: Upload x86_64-guest
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-guest
          path: deploy/x86_64-guest

      - name: Upload aarch64-host
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-host
          path: deploy/aarch64-host

      - name: Upload riscv64-host
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-host
          path: deploy/riscv64-host
